<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Notes App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.4;
    }

    form {
      display: grid;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    input,
    textarea,
    button {
      font: inherit;
      padding: 0.5rem;
    }

    .note-item {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
      display: grid;
      gap: 0.5rem;
    }

    .done {
      text-decoration: line-through;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Simple Notes App (Starter)</h1>
  <p>Student task: complete the logic inside <code>script.js</code>.</p>

  <form id="note-form">
    <input id="note-title" type="text" placeholder="Note title" required>
    <textarea id="note-content" rows="3" placeholder="Note content" required></textarea>
    <button type="submit">Add Note</button>
  </form>

  <p>Total notes: <strong id="total-notes">0</strong></p>
  <p>Done notes: <strong id="done-notes">0</strong></p>

  <ul id="notes-list"></ul>

  <script src="./script.js"></script>
</body>
</html>
